<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Console</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #monitor {
            width: 80%;
            max-width: 600px;
            height: 300px;
            border: 3px solid #39ff14;
            padding: 20px;
            margin-bottom: 20px;
            overflow-y: auto;
            background-color: #000;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #computerInput {
            background: transparent;
            border: none;
            border-bottom: 2px solid #39ff14;
            color: #39ff14;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            padding: 5px;
            width: 250px;
            outline: none;
        }
        button {
            background-color: #39ff14;
            color: black;
            border: none;
            padding: 7px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background-color: #fff;
        }
        .shake-error {
            animation: shake 0.3s ease-in-out;
            border-color: #ff3333 !important;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.7) !important;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-8px, 5px); }
            40% { transform: translate(8px, -5px); }
            60% { transform: translate(-5px, -3px); }
            80% { transform: translate(6px, 4px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <div id="monitor">
        <p>SYSTEM BOOT COMPLETE...</p>
        <p>ENTER PASSWORD TO ACCESS FILES.</p>
    </div>
    <div id="input-container">
        <span>> </span>
        <input type="text" id="computerInput" placeholder="Type password..." autofocus>
        <button onclick="checkCode()">SUBMIT</button>
    </div>
    <script>
        let puzzleStage = 0;

        document.getElementById("computerInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkCode();
            }
        });

        function triggerError(monitorElement, messageHTML) {
            monitorElement.innerHTML += messageHTML;
            monitorElement.classList.add("shake-error");
            setTimeout(() => {
                monitorElement.classList.remove("shake-error");
            }, 300);
        }

        function checkCode() {
            const inputField = document.getElementById("computerInput");
            const rawInput = inputField.value;
            const code = rawInput.toLowerCase().trim(); 
            const monitor = document.getElementById("monitor");
            monitor.innerHTML += `<p style="color: #ffffff; margin: 5px 0;">> ???: ${code}</p>`;
            if (code === "hello") {
                monitor.innerHTML += "<p>> SYSTEM: Sup dawg.</p>";
            } else if (code === "secret") {
                monitor.innerHTML += "<p>> SYSTEM: no sh*t it's secret sherlock.</p>";
            } else if (code === "password") {
                monitor.innerHTML += "<p>> SYSTEM: Haha. Very funny. Now type an actual password.</p>";
            } else if (code === "an actual password") {
                monitor.innerHTML += "<p>> SYSTEM: I bet you're fun at parties. Please for the love of god type something meaningful.</p>";
            } else if (code === "something meaningful") {
                monitor.innerHTML += "<p>> SYSTEM: 01001111 01101000 00100000 01101110 01101001 01100011 01100101 00101100 00100000 01111001 01101111 01110101 00100000 01100100 01101001 01100100 00100000 01110011 01101111 01101101 01100101 00100000 01100100 01100101 01100011 01101001 01110000 01101000 01100101 01110010 01101001 01101110 01100111 00100001</p>";
            } else if (code === "board" || code === "chess") {
                puzzleStage = 1; 
                monitor.innerHTML += `<p>> SYSTEM: PUZZLE - THE OPERA HOUSE</p> <p>White to move.</p>
                <pre style="color: #39ff14; font-family: 'Courier New', Courier, monospace; line-height: 1.4; font-size: 1.1rem; letter-spacing: 0px; margin: 10px 0;">
   a   b   c   d   e   f   g   h
8 [.] [.] [.] [.] [k] [b] [.] [r] 8
7 [p] [.] [.] [n] [.] [p] [p] [p] 7
6 [.] [.] [.] [.] [q] [.] [.] [.] 6
5 [.] [.] [.] [.] [p] [.] [B] [.] 5
4 [.] [.] [.] [.] [P] [.] [.] [.] 4
3 [.] [Q] [.] [.] [.] [.] [.] [.] 3
2 [P] [P] [P] [.] [.] [P] [P] [P] 2
1 [.] [.] [K] [R] [.] [.] [.] [.] 1
   a   b   c   d   e   f   g   h
                </pre>
                <p>> LEGEND: [r,n,b,q,k,p] = Black | [R,N,B,Q,K,P] = White</p>
                `;
            } else if ((code === "qb8+" || code === "qb8") && puzzleStage === 1) {
                puzzleStage = 2; 
                monitor.innerHTML += `
                <p>> SYSTEM: CRITICAL HIT! Black is forced to capture with 'Nxb8'.</p>
                <p>> SYSTEM: Now, enter the final crushing move coordinate to deliver mate.</p>
                `;
            } else if ((code === "rd8#" || code === "rd8") && puzzleStage === 2) {
                puzzleStage = 0; 
                monitor.innerHTML += "<p>> SYSTEM: CHECKMATE! You have recreated Morphy's masterpiece. File unlocked: 'OPERA'.</p>";
            } else if (code === "") {
                triggerError(monitor, "<p>> ERROR: Input cannot be empty.</p>");
            } else {
                triggerError(monitor, `<p>> ERROR: '${code}' is an invalid command.</p>`);
            }
            inputField.value = "";
            monitor.scrollTop = monitor.scrollHeight;
        }
    </script>
</body>
</html>
